<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="rb-head" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b8e0e1"/>
      <stop offset="100%" stop-color="#9dd4d5"/>
    </linearGradient>
    <linearGradient id="rb-visor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f6f6"/>
      <stop offset="100%" stop-color="#d4edee"/>
    </linearGradient>
  </defs>
  <!-- Speech bubble (ellipsis = typing) -->
  <path
    d="M9 3h12a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-1l-.6 2.2 2.2-1.4H9a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"
    fill="white"
    stroke="#0d7377"
    stroke-width="1"
    stroke-linejoin="round"
  />
  <circle cx="12.5" cy="6" r="1" fill="#095c5f"/>
  <circle cx="16" cy="6" r="1" fill="#095c5f"/>
  <circle cx="19.5" cy="6" r="1" fill="#095c5f"/>
  <!-- Robot head (rounded U) -->
  <path
    d="M11 11.5h10v1.2c0 .4 0 .8-.1 1.2v4.8c0 1.6-1.3 3-3 3h-3.8c-1.6 0-3-1.4-3-3v-4.8c0-.4-.1-.8-.1-1.2V11.5z"
    fill="url(#rb-head)"
    stroke="#0d7377"
    stroke-width="1"
    stroke-linejoin="round"
  />
  <!-- Top cap -->
  <rect x="12" y="9.5" width="8" height="2.2" rx="1" fill="url(#rb-head)" stroke="#0d7377" stroke-width="1"/>
  <!-- Visor -->
  <rect x="12.8" y="13" width="6.4" height="3.2" rx="0.8" fill="url(#rb-visor)" stroke="#0d7377" stroke-width="1"/>
  <!-- Eyes -->
  <circle cx="14.5" cy="14.5" r="0.85" fill="#095c5f"/>
  <circle cx="17.5" cy="14.5" r="0.85" fill="#095c5f"/>
  <!-- Smile -->
  <path d="M14.2 17.2c.45.35 1.1.5 1.8.5.7 0 1.35-.15 1.8-.5" stroke="#095c5f" stroke-width="0.75" stroke-linecap="round" fill="none"/>
  <!-- Antennae -->
  <line x1="13.5" y1="9.5" x2="13.5" y2="6.8" stroke="#0d7377" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="18.5" y1="9.5" x2="18.5" y2="6.8" stroke="#0d7377" stroke-width="0.9" stroke-linecap="round"/>
  <circle cx="13.5" cy="6" r="0.7" fill="#095c5f"/>
  <circle cx="18.5" cy="6" r="0.7" fill="#095c5f"/>
  <!-- Headset arm + mic -->
  <path d="M11 10.8v1.8a.8.8 0 0 0 .8.8h.5" stroke="#0d7377" stroke-width="0.9" stroke-linecap="round" fill="none"/>
  <rect x="9.2" y="13" width="2" height="1.1" rx="0.5" fill="#b8e0e1" stroke="#0d7377" stroke-width="0.8"/>
</svg>
